name: ci

on:
  push:
    branches: [main, "feature/**", "fix/**", "release/**", "hotfix/**"]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: fmt check
        run: |
          files=$(find . -name '*.go' -type f)
          [ -z "$files" ] || test -z "$(gofmt -l $files)"

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: test
        run: go test ./...
      - name: build core
        shell: bash
        run: |
          set -euo pipefail
          REVISION="${GITHUB_SHA::7}"
          VERSION="${GITHUB_REF_NAME:-dev}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -buildid= -X main.version=${VERSION} -X main.revision=${REVISION} -X main.buildTime=${BUILD_TIME}"
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -tags netgo -ldflags="${LDFLAGS}" ./core/cmd/vrc-loghook
      - name: build gui
        shell: bash
        run: |
          set -euo pipefail
          REVISION="${GITHUB_SHA::7}"
          VERSION="${GITHUB_REF_NAME:-dev}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -buildid= -X main.version=${VERSION} -X main.revision=${REVISION} -X main.buildTime=${BUILD_TIME}"
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -tags netgo -ldflags="${LDFLAGS}" ./gui/cmd/vrc-loghook-gui
