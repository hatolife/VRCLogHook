name: ci

on:
  push:
    branches: [main, "feature/**", "fix/**", "release/**", "hotfix/**"]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: fmt check
        run: |
          files=$(find . -name '*.go' -type f)
          [ -z "$files" ] || test -z "$(gofmt -l $files)"

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: test
        run: go test ./...
      - name: build core
        run: go build ./core/cmd/vrc-loghook
      - name: build gui
        run: go build ./gui/cmd/vrc-loghook-gui
