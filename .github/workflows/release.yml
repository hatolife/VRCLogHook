name: release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: test
        run: go test ./...
      - name: build core
        run: go build ./core/cmd/vrc-loghook
      - name: build gui
        run: go build ./gui/cmd/vrc-loghook-gui

  build-artifacts:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o dist/vrc-loghook-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./core/cmd/vrc-loghook
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o dist/vrc-loghook-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./gui/cmd/vrc-loghook-gui
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: dist
      - name: create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
