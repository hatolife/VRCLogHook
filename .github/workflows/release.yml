name: release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: test
        run: go test ./...
      - name: build core
        shell: bash
        run: |
          set -euo pipefail
          REVISION="${GITHUB_SHA::7}"
          VERSION="${GITHUB_REF_NAME:-dev}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -buildid= -X main.version=${VERSION} -X main.revision=${REVISION} -X main.buildTime=${BUILD_TIME}"
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -tags netgo -ldflags="${LDFLAGS}" ./core/cmd/vrc-loghook
      - name: build gui
        shell: bash
        run: |
          set -euo pipefail
          REVISION="${GITHUB_SHA::7}"
          VERSION="${GITHUB_REF_NAME:-dev}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -buildid= -X main.version=${VERSION} -X main.revision=${REVISION} -X main.buildTime=${BUILD_TIME}"
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -tags netgo -ldflags="${LDFLAGS}" ./gui/cmd/vrc-loghook-gui

  build-artifacts:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          REVISION="${GITHUB_SHA::7}"
          VERSION="${GITHUB_REF_NAME:-dev}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS_COMMON="-s -w -buildid= -X main.version=${VERSION} -X main.revision=${REVISION} -X main.buildTime=${BUILD_TIME}"
          GUI_OUT="dist/vrc-loghook-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          CORE_OUT="dist/vrc-loghook-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -buildvcs=false -tags netgo -ldflags="${LDFLAGS_COMMON}" -o "$GUI_OUT" ./gui/cmd/vrc-loghook-gui
          GUI_HASH="$(sha256sum "$GUI_OUT" | awk '{print $1}')"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -buildvcs=false -tags netgo -ldflags="${LDFLAGS_COMMON} -X main.expectedGUIHash=${GUI_HASH}" -o "$CORE_OUT" ./core/cmd/vrc-loghook
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: dist
      - name: create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
